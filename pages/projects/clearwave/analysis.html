<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clearwave — Browse Analysis — Cognatix</title>
  <link rel="icon" type="image/svg+xml" href="../../../images/favicon.svg">
    <link rel="stylesheet" href="../../../styles/output.css">
  <style>
    .sidebar-link { display: flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0.5rem; border-radius: 0.5rem; font-size: 0.875rem; transition: background 160ms; text-decoration: none; color: inherit; }
    .sidebar-link:hover { background: var(--ink-sage-100); }
    .sidebar-link.active { background: var(--ink-sage-600); color: var(--ink-sage-0); }
    .sidebar-link.active .lucide { opacity: 1; }
  </style>
</head>
<body class="antialiased">
  <div class="flex min-h-screen">
    <div id="sidebar"></div>
    <main class="flex-1 ml-56">
      <div id="header"></div>

      <!-- Empty state -->
      <div class="flex flex-col items-center justify-center px-6 py-24 text-center">
        <svg class="lucide opacity-20 mb-4" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
        <h2 class="text-lg font-semibold mb-2">Browse Analysis</h2>
        <p class="text-sm opacity-50 max-w-sm mb-4">Explore extracted entities, business functions, and system architecture. This view launches in a separate analysis browser.</p>
        <a href="#" class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg inks-sage-500 hover transition no-underline">
          Open Analysis Browser
        </a>
      </div>
    </main>
  </div>

  <script src="../../../shared.js"></script>
  <script>
    initLayout({
      actions: `
        <button class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg inks-sage-500 hover transition">
          <svg class="lucide" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
          Rerun Analysis
        </button>
      `
    });
  </script>
</body>
</html>
